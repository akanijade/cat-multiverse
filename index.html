<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat Multiverse Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <h1 id="title">🐱 Cat Multiverse Explorer</h1>

    <p id="lore">Click to enter another cat universe...</p>

    <img id="catImage" src="images/cat1.png" alt="cat" />

    <button id="btn">Switch Universe (+1 🐱)</button>
    <div id="gallery">
      <h3>🐾 Collected Cats</h3>
      <div id="catList"></div>
      <div id="companion">🐱</div>
      <h2 id="catCount">🐱 Cats: 0</h2>
      <div id="shop">
          <h3>🛒 Upgrade Shop</h3>
          <button onclick="buyDouble()">Double Cats (10 🐱)</button>
          <button onclick="buyAuto()">Auto Cats (25 🐱)</button>
      </div>
      <button id="bossBtn" onclick="loadBoss()" style="display:none;">
        👹 Revisit Boss
      </button>
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
      <p id="progressText"></p>
      <button onclick="resetGame()">🗑 Reset Game</button>
      <button onclick="exportSave()">💾 Export Save</button>
      <button onclick="importSave()">📥 Import Save</button>
      <button onclick="stopAuto()">Stop Auto</button>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
