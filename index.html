<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat Multiverse Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app">
    <h1 id="title">🐱 Cat Multiverse Explorer</h1>

    <p id="lore">Click to enter another cat universe...</p>

    <img id="catImage" src="images/cat1.png" alt="cat" />

    <button id="btn">Switch Universe (+1 🐱)</button>
    <div id="gallery">
      <h3>🐾 Collected Cats</h3>
      <div id="catList"></div>
      <div id="companion">🐱</div>
      <h2 id="catCount">🐱 Cats: 0</h2>
      <div id="shop">
          <h3>🛒 Upgrade Shop</h3>
          <button onclick="buyDouble()">Double Cats (10 🐱)</button>
          <button onclick="buyAuto()">Auto Cats (25 🐱)</button>
      </div>
      <button onclick="loadBoss()">👹 Revisit Boss</button>
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
      <p id="progressText"></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
<script>
  function updateGallery() {
  const list = document.getElementById("catList");
  list.innerHTML = collected.map(c => `<p>🐱 ${c}</p>`).join("");
}


updateGallery()
</script>
</html>
